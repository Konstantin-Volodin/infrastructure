server:
  address: 'tcp://:9091'

theme: 'dark'

log:
  level: 'debug'
  format: json
  file_path: '/data/log/authelia.log'
  keep_stdout: true

totp: # Time-based One-Time Password
  issuer: '{{ env "DOMAIN" }}' # Might need to be authelia.com
  period: 30
  digits: 6
  algorithm: 'sha1'
  skew: 1

authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      key_length: 32
      salt_length: 16
      parallelism: 4
      memory: 256

password_policy:
  standard:
    enabled: true
    min_length: 30

access_control:
  default_policy: 'deny'
  rules:
    - domain: 
      - 'auth.{{ env "DOMAIN" }}'
      policy: 'bypass'
    - domain: 
      - '{{ env "DOMAIN"}}'
      - '*.{{ env "DOMAIN" }}'
      policy: 'two_factor'

session:
  name: 'authelia_session'
  expiration: '1h'
  inactivity: '5m'
  remember_me: '1M'
  # secret: '{{ env "AUTHELIA_SESSION_SECRET" }}'
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      same_site: 'lax'

regulation:
  max_retries: 3
  find_time: '2m'
  ban_time: '30m'

storage:
  # encryption_key: '{{ env "AUTHELIA_STORAGE_ENCRYPTION_KEY" }}'
  local:
    path: '/config/db.sqlite3'

notifier:
  filesystem:
    filename: '/data/notification.txt'

identity_providers:
  oidc:
    hmac_secret: '{{ env "AUTHELIA_OIDC_HMAC_SECRET" }}'
    jwks:
      - key: {{ secret "/config/secrets/oidc.jwks.key" | mindent 10 "|" | msquote }}
    clients:
      - client_id: 'immich'
        client_name: 'Immich'
        client_secret: '{{ env "IMMICH_OIDC_SECRET" }}'
        token_endpoint_auth_method: 'client_secret_post'
        consent_mode: 'implicit'
        redirect_uris:
          - 'https://photos.{{ env "DOMAIN" }}/auth/login'
        scopes:
          - 'openid'
          - 'email'
          - 'profile'
        userinfo_signed_response_alg: 'none'

      - client_id: 'mealie'
        client_name: 'Mealie'
        client_secret: '{{ env "MEALIE_OIDC_SECRET" }}'
        token_endpoint_auth_method: 'client_secret_basic'
        consent_mode: 'implicit'
        redirect_uris:
          - 'https://recipes.{{ env "DOMAIN" }}/login'
        scopes:
          - 'openid'
          - 'email'
          - 'profile'
        userinfo_signed_response_alg: 'none'