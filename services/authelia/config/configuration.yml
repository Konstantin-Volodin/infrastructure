server:
  address: 'tcp://:9091'

theme: 'dark'

log:
  level: 'debug'
  format: json
  file_path: 'data/log/authelia.log'
  keep_stdout: true

totp: # Time-based One-Time Password
  issuer: '{{ env "DOMAIN" }}' # Might need to be authelia.com
  period: 30
  digits: 6
  algorithm: 'sha1'
  skew: 1

authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      key_length: 32
      salt_length: 16
      parallelism: 4
      memory: 256

password_policy:
  standard:
    enabled: true
    min_length: 30

access_control:
  default_policy: 'deny'
  rules:
    - domain: 
      - 'auth.{{ env "DOMAIN" }}'
      policy: 'bypass'
    - domain: 
      - '{{ env "DOMAIN"}}'
      - '*.{{ env "DOMAIN" }}'
      policy: 'two_factor'

session:
  name: 'authelia_session'
  expiration: '1h'
  inactivity: '5m'
  remember_me: '1M'
  # secret: '{{ env "AUTHELIA_SESSION_SECRET" }}'
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      same_site: 'lax'

regulation:
  max_retries: 3
  find_time: '2m'
  ban_time: '30m'

storage:
  # encryption_key: '{{ env "AUTHELIA_STORAGE_ENCRYPTION_KEY" }}'
  local:
    path: '/config/db.sqlite3'

notifier:
  filesystem:
    filename: '/data/notification.txt'