services:
  ts-mealie:
    container_name: ts-mealie
    image: tailscale/tailscale:v1.94.2
    hostname: recipes
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/tailscale.json
    volumes:
      - ./data/tailscale/state:/var/lib/tailscale
      - ./config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  mealie:
    container_name: mealie
    image: ghcr.io/mealie-recipes/mealie:v3.12.0 # 
    network_mode: service:ts-mealie
    depends_on:
      - ts-mealie
    restart: always
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - ${MEALIE_DATA}:/app/data/
    env_file: ../../.env
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: ${TIMEZONE}
      THEME_LIGHT_PRIMARY: '#6366F1'
      THEME_LIGHT_ACCENT: '#6366F1'
      THEME_LIGHT_SECONDARY: '#64748B'
      THEME_DARK_PRIMARY: '#6366F1'
      THEME_DARK_ACCENT: '#6366F1'
      THEME_DARK_SECONDARY: '#1E293B'