services:
  mealie:
    container_name: mealie
    image: ghcr.io/mealie-recipes/mealie:v3.12.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - ${MEALIE_DATA}:/app/data/
    env_file: ../../.env
    extra_hosts:
      - "auth.${DOMAIN}:${HOST_IP}"
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: ${TIMEZONE}
      THEME_LIGHT_PRIMARY: '#6366F1'
      THEME_LIGHT_ACCENT: '#6366F1'
      THEME_LIGHT_SECONDARY: '#64748B'
      THEME_DARK_PRIMARY: '#6366F1'
      THEME_DARK_ACCENT: '#6366F1'
      THEME_DARK_SECONDARY: '#1E293B'
      BASE_URL: https://recipes.${DOMAIN}
      OIDC_AUTH_ENABLED: "true"
      OIDC_SIGNUP_ENABLED: "true"
      OIDC_CONFIGURATION_URL: https://auth.${DOMAIN}/.well-known/openid-configuration
      OIDC_CLIENT_ID: mealie
      OIDC_CLIENT_SECRET: ${MEALIE_OIDC_SECRET}
      OIDC_PROVIDER_NAME: Authelia
      OIDC_REMEMBER_ME: "true"
      OIDC_AUTO_REDIRECT: "false"
    networks:
      - proxy
